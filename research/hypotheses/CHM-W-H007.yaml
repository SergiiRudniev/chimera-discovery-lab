id: CHM-W-H007
registered_at: 2026-07-15
status: registered
hypothesis: >-
  Symmetric conflict projection between closed-loop state and intervention-effect
  task gradients stabilizes the paired 50:50 probe/random curriculum, reducing
  intervention-effect prediction error by at least 10% without increasing
  four-step rollout error in unseen world-family mappings compared with matched
  random-only closed-loop training.
scope: multi_objective_gradient_stability
parent: CHM-W-H006
rationale:
  diagnostic: research/diagnostics/CHM-W-H007-gradient-conflict.json
  observation: >-
    On 32 train-only mixed batches, shared-backbone state/effect gradient cosine
    was negative in 62.5% of batches with median -0.0424, while median effect and
    state gradient norms were comparable.
data:
  dataset_id: CHM-W-WG1
  generator_config: configs/meta_world/world_generators_h004.yaml
  training_policies:
    deterministic_system_identification_probe_v1: 0.50
    seeded_random: 0.50
  evaluation_policy: probe_prefix_4_then_seeded_random_v1
  paired_worlds_across_training_policies: true
  language_input: false
  hidden_metadata_excluded_from_model_forward:
    - gradient_task_id
    - action_policy_id
    - world_family_id
    - world_instance_id
    - mechanism_id
    - renderer_id
    - generation_seed
method:
  model: relational_sequence_world_model
  rollout_horizon: 4
  rollout_mode: autoregressive_closed_loop
  mechanism_discrimination_weight: 0.0
  state_supervision: all_mixed_trajectories
  intervention_effect_supervision: all_mixed_trajectories
  optimizer: AdamW
  gradient_intervention:
    id: symmetric_global_pcgrad_v1
    weighted_state_gradient: g_state
    weighted_effect_gradient: g_effect
    conflict_if: dot(g_state, g_effect) < 0
    state_projection: >-
      g_state - dot(g_state, g_effect) / squared_norm(g_effect) * g_effect
    effect_projection: >-
      g_effect - dot(g_state, g_effect) / squared_norm(g_state) * g_state
    non_conflict_update: g_state + g_effect
    conflict_update: projected_state + projected_effect
    auxiliary_gradient: added_after_task_projection
    global_gradient_clip_norm: 1.0
    deterministic_task_order: [state, effect]
  gradient_task_id_passed_to_model: false
  controlled_variable: gradient_conflict_projection
  evaluator_policy_identical_across_arms: true
protocol:
  trial_id: CHM-W-T007
  status: not_run
  development_seed: 260918
  frozen_validation_seeds:
    - 260919
    - 260920
    - 260921
  comparison_arms:
    - pcgrad_mixed_closed_loop_without_discrimination
    - standard_mixed_closed_loop_without_discrimination
    - matched_random_only_closed_loop_without_discrimination
    - one_step_relational_without_discrimination
    - temporal_predictor_without_relational_state
    - legal_random_intervention
  development_gate:
    intervention_effect_nrmse_ratio_vs_random_maximum: 0.90
    four_step_rollout_nrmse_ratio_vs_random_maximum: 1.00
    intervention_effect_90_coverage_minimum: 0.85
    observed_conflict_fraction_minimum: 0.10
    deterministic_replay_rate: 1.00
    split_leakage_findings: 0
    all_metrics_finite: true
    test_metrics_opened: false
  validation_preflight:
    hyperparameters_and_checkpoint_step_frozen_before_validation_seeds: true
    freeze_trial_only_if:
      median_intervention_effect_nrmse_ratio_vs_random_maximum: 0.90
      median_four_step_rollout_nrmse_ratio_vs_random_maximum: 1.00
      each_seed_four_step_rollout_nrmse_ratio_vs_random_maximum: 1.05
      intervention_effect_90_coverage_minimum: 0.85
      deterministic_replay_rate: 1.00
      split_leakage_findings: 0
      all_metrics_finite: true
    test_metrics_opened: false
  primary_split: test_world_transfer
  primary_metrics:
    - intervention_effect_nrmse
    - four_step_rollout_nrmse
  pass_if:
    intervention_effect_nrmse_ratio_vs_random_maximum: 0.90
    intervention_effect_paired_bootstrap_90_percent_ratio_upper_bound_below: 1.00
    four_step_rollout_nrmse_ratio_vs_random_maximum: 1.00
    four_step_rollout_paired_bootstrap_90_percent_ratio_upper_bound_maximum: 1.05
    deterministic_replay_rate: 1.00
    split_leakage_findings: 0
    all_metrics_finite: true
  secondary_metrics:
    - standard_mixed_intervention_effect_nrmse
    - gradient_conflict_fraction
    - gradient_cosine_mean
    - one_step_prediction_rmse
    - intervention_effect_90_coverage
    - object_permutation_invariance
    - channel_permutation_invariance
    - out_of_distribution_detection
    - intervention_regret
  human_or_llm_judging_in_primary_experiment: false
  claim_boundary: >-
    A passing result supports optimizer-level conflict handling in generated
    simulators only. It is not evidence of real-world causal discovery, safe
    real-world experimentation, profitable business ideas,
    language-independent thought or production readiness.
result: research/results/CHM-W-H007.json
