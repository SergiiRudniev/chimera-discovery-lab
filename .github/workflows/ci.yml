name: CI

on:
  push:
    branches:
      - main
      - "chimera-*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Types
        run: mypy src
      - name: Tests
        run: pytest --cov=chimera --cov-report=term-missing
      - name: Research ledger
        run: chimera validate-research
      - name: Registered parameter count
        run: chimera inspect --config configs/venture/venture_v0_1_20m.yaml
